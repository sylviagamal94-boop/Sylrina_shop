<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylrina Shop | فخامة وأناقة</title>
    <style>
        :root {
            --primary-color: #D4AF37; /* ذهبي */
            --bg-color: #FFFBF5; /* بيج فاتح */
            --accent-color: #F8E8EE; /* روز */
            --text-color: #4A4A4A;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
        }
        /* الهيدر - زي شوبيفاي */
        header {
            background: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary-color); }
        
        /* قسم الهيرو (أول صورة كبيرة) */
        .hero {
            height: 400px;
            background: var(--accent-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }

        /* شبكة المنتجات (Pinterest Style) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { height: 250px; background: #eee; }
        .product-info { padding: 15px; text-align: center; }
        .price { color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SYLRINA</div>
        <nav>الأقسام | السلة | تسجيل الدخول</nav>
    </header>

    <section class="hero">
        <h1>مجموعتنا الجديدة وصلت ✨</h1>
        <p>اكتشفي الأناقة في كل قطعة</p>
        <button>تسوقي الآن</button>
    </section>

    <div class="product-grid">
        <div class="product-card">
            <div class="product-image"></div>
            <div class="product-info">
                <h3>فستان سهرة فخم</h3>
                <p class="price">1,200 ج.م</p>
                <button style="background:none; border: 1px solid #D4AF37; padding:5px 10px; border-radius:15px; cursor:pointer;">أضف للسلة</button>
            </div>
        </div>
    </div>

</body>
</html>
